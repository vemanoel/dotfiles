[mouse]
hide_when_typing = true

[cursor]
unfocused_hollow = false
style = { shape = "Beam", blinking = "Never" }

[font]
size = 12.0
normal = { family = "Iosevka", style = "Extended" }
bold = { family = "Iosevka", style = "Bold Extended" }
italic = { family = "Iosevka", style = "Extended" } # Extended Italic
bold_italic = { family = "Iosevka", style = "Bold Extended" } # Bold Extended Italic
