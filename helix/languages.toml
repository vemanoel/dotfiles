[language-server.gopls]
command = "gopls"

[language-server.gopls.config]
diagnosticsDelay = "1s"
hoverKind = "SingleLine"
diagnosticsTrigger = "Edit"
staticcheck = true
semanticTokens = true
usePlaceholders = false
verboseOutput = true
completeUnimported = true

[language-server.gopls.config.analyses]
shift = true
unusedvariable = true
nilness = true
unusedparams = true
unusedwrite = true
useany = true
shadow = true
slicesdelete = true
ST1000 = false

[[language]]
name = "go"
auto-format = true
language-servers = ["gopls"]
roots = ["go.work", "go.mod"]

[[language]]
name = "gomod"
auto-format = true
language-servers = ["gopls"]

[[language]]
name = "gowork"
auto-format = true
language-servers = ["gopls"]

[[language]]
name = "gotmpl"
auto-format = true
language-servers = ["gopls"]
